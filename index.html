<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORANGE LAB AI — Planejador de Conteudo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0A;--bg2:#111;--bg3:#1A1A1A;--bg4:#222;--border:#2A2A2A;--text:#E2E8F0;--muted:#888;--orange:#F97316;--pink:#EC4899;--purple:#8B5CF6;--green:#10B981;--blue:#3B82F6;--red:#EF4444;--yellow:#F59E0B;--cyan:#06B6D4}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea{font-family:inherit}

/* Sidebar */
.sidebar{width:250px;background:#0F0F0F;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--orange),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0}
.logo-text{line-height:1.2}.logo-title{font-weight:800;font-size:15px}.logo-sub{font-size:10px;color:var(--orange);font-weight:600;letter-spacing:2px}
.sidebar nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-weight:400;font-size:13px;transition:all .2s;width:100%;text-align:left;border-left:3px solid transparent}
.nav-btn:hover{background:rgba(249,115,22,.08);color:#ccc}
.nav-btn.active{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(236,72,153,.15));color:var(--orange);font-weight:700;border-left-color:var(--orange)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:#555}
.sidebar-footer strong{color:var(--muted);display:block}

/* Main */
.main{flex:1;overflow-y:auto;padding:28px 36px}
.section{display:none}.section.active{display:block}

/* Components */
.header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header p{font-size:14px;color:var(--muted);margin-bottom:24px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-ghost{background:var(--bg4)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.search-box{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;margin-bottom:16px}
.search-box:focus{outline:none;border-color:var(--orange)}

/* Idea Cards */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.idea-card{background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;position:relative}
.idea-card:hover{border-left-color:var(--orange);background:#1e1e1e;transform:translateY(-2px)}
.idea-card .idea-cat{font-size:11px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.idea-card .idea-title{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.4}
.idea-card .idea-tags{display:flex;gap:6px;flex-wrap:wrap}
.idea-card .idea-tags span{font-size:10px;padding:2px 8px;border-radius:12px;background:rgba(249,115,22,.12);color:var(--orange)}
.idea-card .idea-click{position:absolute;top:12px;right:12px;font-size:10px;color:var(--muted);opacity:0;transition:opacity .2s}
.idea-card:hover .idea-click{opacity:1}
.idea-card .idea-save{position:absolute;bottom:12px;right:12px;font-size:11px;padding:4px 12px;border-radius:8px;border:1px solid var(--orange);background:rgba(249,115,22,.1);color:var(--orange);cursor:pointer;opacity:0;transition:all .2s;font-weight:600}
.idea-card:hover .idea-save{opacity:1}
.idea-card .idea-save:hover{background:var(--orange);color:#fff}

/* Hook Cards */
.hooks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.hook-card{background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(236,72,153,.06));border:1px solid rgba(249,115,22,.2);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.hook-card:hover{border-color:var(--orange);transform:translateY(-2px)}
.hook-card .hook-emoji{font-size:22px;margin-bottom:6px}
.hook-card .hook-text{font-size:14px;font-weight:600;line-height:1.5}
.hook-card .hook-cat{font-size:11px;color:var(--pink);margin-top:8px;font-weight:600}

/* Viral Items */
.viral-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.viral-item{background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.viral-item:hover{border-color:var(--cyan);transform:translateY(-2px)}
.viral-item .vi-title{font-size:14px;font-weight:600;margin-bottom:6px}
.viral-item .vi-stats{font-size:12px;color:var(--muted);margin-bottom:8px}
.viral-item .vi-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(6,182,212,.15);color:var(--cyan)}
.gravar-hoje{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(6,182,212,.08));border-color:var(--green)}

/* Filter Pills */
.pill-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pill{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.pill.active,.pill:hover{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border-color:transparent}

/* Travel Planner */
.travel-form{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px}
.travel-form label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
.travel-form input,.travel-form select{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px}
.travel-form input:focus,.travel-form select:focus{outline:none;border-color:var(--orange)}
.day-block{margin-bottom:20px}
.day-block h4{font-size:16px;font-weight:700;color:var(--orange);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.day-video{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.day-video:hover{border-color:var(--orange);background:#1e1e1e}
.day-video .dv-time{font-size:12px;color:var(--orange);font-weight:700;min-width:60px}
.day-video .dv-title{font-size:14px;font-weight:600}
.day-video .dv-type{font-size:11px;color:var(--muted)}

/* Brain Charts */
.brain-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.brain-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px}
.brain-card h4{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--cyan)}
.insight{padding:12px;background:var(--bg4);border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.5;border-left:3px solid var(--orange)}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-header{font-size:11px;color:var(--muted);text-align:center;padding:8px 0;font-weight:700}
.cal-day{background:var(--bg3);border:1px solid var(--border);border-radius:8px;min-height:80px;padding:8px;font-size:12px;cursor:pointer;transition:all .15s}
.cal-day:hover{border-color:var(--orange)}
.cal-day .cal-num{font-weight:700;margin-bottom:4px;color:var(--muted)}
.cal-day.today .cal-num{color:var(--orange)}
.cal-day .cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}

/* Banco de Ideias */
.bank-item{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.bank-item .bi-text{font-size:14px;font-weight:500;flex:1}
.bank-item .bi-status{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700}
.bi-status.pendente{background:rgba(245,158,11,.15);color:var(--yellow)}
.bi-status.para_edicao{background:rgba(139,92,246,.15);color:var(--purple)}
.bi-status.editado{background:rgba(6,182,212,.15);color:var(--cyan)}
.bi-status.gravado{background:rgba(16,185,129,.15);color:var(--green)}
.bi-status.publicado{background:rgba(59,130,246,.15);color:var(--blue)}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;width:90%;max-width:720px;max-height:85vh;overflow-y:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:var(--bg4);border:none;color:var(--text);font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--red)}
.modal h2{font-size:22px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal .modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.modal .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.modal .info-box{background:var(--bg3);border-radius:10px;padding:12px}
.modal .info-box label{font-size:11px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.modal .info-box p{font-size:13px;line-height:1.5}
.modal .script-section{margin-bottom:16px}
.modal .script-section h4{font-size:14px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.modal .script-text{font-size:13px;line-height:1.6;padding:12px;background:var(--bg3);border-radius:10px}
.takes-timeline{position:relative;padding-left:30px;margin-bottom:16px}
.take{position:relative;margin-bottom:14px;padding:12px;background:var(--bg3);border-radius:10px}
.take::before{content:attr(data-num);position:absolute;left:-30px;top:12px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.takes-timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
.take .take-title{font-size:13px;font-weight:700;margin-bottom:4px}
.take .take-desc{font-size:12px;color:var(--muted);line-height:1.5}
.modal .hashtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal .hashtags span{font-size:12px;padding:4px 10px;border-radius:10px;background:rgba(249,115,22,.1);color:var(--orange);cursor:pointer}
.modal .modal-actions{display:flex;gap:10px;flex-wrap:wrap}

/* Subir Ideia */
.upload-tabs{display:flex;gap:8px;margin-bottom:16px}
.upload-tab{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.upload-tab.active{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border-color:transparent}
.upload-area textarea{width:100%;padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;min-height:120px;resize:vertical}
.upload-area textarea:focus{outline:none;border-color:var(--orange)}

/* Lock Screen */
.lock-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0A0A0A;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.lock-screen.unlocked{display:none}
.lock-box{text-align:center;max-width:380px;width:90%}
.lock-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#F97316,#EC4899);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;color:#fff;margin:0 auto 24px}
.lock-title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#F97316,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.lock-sub{font-size:14px;color:#888;margin-bottom:28px}
.lock-input{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.lock-input input{width:52px;height:60px;text-align:center;font-size:24px;font-weight:800;border-radius:12px;border:2px solid #2A2A2A;background:#111;color:#F97316;outline:none;transition:border-color .2s}
.lock-input input:focus{border-color:#F97316}
.lock-error{color:#EF4444;font-size:13px;min-height:20px;margin-bottom:10px}
.lock-btn{padding:12px 40px;border-radius:12px;border:none;background:linear-gradient(135deg,#F97316,#EC4899);color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:opacity .2s}
.lock-btn:hover{opacity:.9}
.lock-btn:disabled{opacity:.5;cursor:not-allowed}

/* Settings Section */
.settings-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.settings-card h3{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.settings-row label{font-size:13px;color:var(--muted);min-width:120px}
.settings-row input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px}
.settings-row input:focus{outline:none;border-color:var(--orange)}
.settings-hint{font-size:11px;color:#666;margin-top:4px;line-height:1.5}

/* AI Loading spinner */
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 20px}
.ai-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:aispin 1s linear infinite}
@keyframes aispin{to{transform:rotate(360deg)}}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

.ai-loading p{color:var(--muted);font-size:14px;text-align:center}

</style>
</head>

<!-- Main Content -->

<!-- Modal -->

// ============ HELPERS ============
function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getTemplate(text){
  const n = normalize(text);
  const keys = Object.keys(TEMPLATES).filter(k=>k!=='_default');
  for(const k of keys){ if(n.includes(k)) return TEMPLATES[k]; }
  if(n.includes('loja')||n.includes('compra')||n.includes('preco')||n.includes('haul')||n.includes('barato')) return TEMPLATES.walmart;
  if(n.includes('parque')||n.includes('fila')||n.includes('atracao')||n.includes('montanha')) return TEMPLATES.disney;
  if(n.includes('restaurante')||n.includes('comer')||n.includes('prato')||n.includes('cafe')) return TEMPLATES.comida;
  if(n.includes('dica')||n.includes('chip')||n.includes('carro')||n.includes('mala')||n.includes('hotel')) return TEMPLATES.viagem;
  return TEMPLATES._default;
}

    </div>
    <div class="ideas-grid" id="ideasGrid"></div>
  `;
  window._ideasAll = allFlat;
  window._ideasShown = shuffled;
  renderIdeasGrid(shuffled);
}

      <span class="idea-click">Clique para roteiro →</span>
      <div class="idea-cat">${i.cat}</div>

      <button class="idea-save" onclick="event.stopPropagation();saveIdeaToBank('${i.title.replace(/'/g,"\\'")}')">💾 Salvar</button>
    </div>
  `).join('');

function saveIdeaToBank(title){
  if(savedIdeas.find(i=>i.text===title)){
    const btn=event.target;btn.textContent='✅ Já salva!';btn.style.background='var(--green)';btn.style.color='#fff';btn.style.borderColor='var(--green)';
    setTimeout(()=>{btn.textContent='💾 Salvar';btn.style.background='';btn.style.color='';btn.style.borderColor='';},1500);
    return;
  }
  savedIdeas.push({text:title,status:'pendente',date:new Date().toLocaleDateString('pt-BR')});
  saveBank();
  const btn=event.target;btn.textContent='✅ Salva!';btn.style.background='var(--green)';btn.style.color='#fff';btn.style.borderColor='var(--green)';
  setTimeout(()=>{btn.textContent='💾 Salvar';btn.style.background='';btn.style.color='';btn.style.borderColor='';},1500);
}
function filterIdeas(){
  const q = normalize(document.getElementById('ideasSearch').value);
  if(!q){renderIdeasGrid(window._ideasShown);return;}
  const results = window._ideasAll.filter(i=>{
    const score = i.tags.some(t=>normalize(t)===q)?10 : i.tags.some(t=>normalize(t).includes(q))?5 : normalize(i.title).includes(q)?3 : 0;
    i._score = score;
    return score > 0;
  }).sort((a,b)=>b._score - a._score);
  renderIdeasGrid(results);
}
function filterIdeasCat(cat){
  document.querySelectorAll('#ideasPills .pill').forEach(p=>p.classList.remove('active'));

function toggleTravelPill(btn){btn.classList.toggle('active')}
function generateTravel(){
  const dest = document.getElementById('travelDest').value;
  const days = parseInt(document.getElementById('travelDays').value) || 3;
  const db = TRAVEL_DB[dest];
  if(!db){document.getElementById('travelResult').innerHTML='<p style="color:var(--muted)">Destino nao disponivel ainda</p>';return;}

  const selected = [...document.querySelectorAll('#travelInterests .pill.active')].map(b=>b.dataset.cat);
  if(selected.length===0){alert('Selecione pelo menos um interesse!');return;}

  let pool = [];
  selected.forEach(cat=>{pool = pool.concat(db[cat]||[]);});
  pool = shuffle(pool);

  let html = '';
  for(let d=1;d<=days;d++){
    const dayItems = pool.splice(0,Math.min(5,Math.ceil(pool.length/(days-d+1))));
    if(dayItems.length===0 && pool.length>0){dayItems.push(pool.shift());}
    dayItems.sort((a,b)=>parseInt(a.time)-parseInt(b.time));
    html += `<div class="day-block"><h4>📅 Dia ${d}</h4>`;
    dayItems.forEach(item=>{
      const videoTitle = `Video em ${item.name}: ${item.type}`;
      html += `<div class="day-video" onclick="openScriptModal('${videoTitle.replace(/'/g,"\\'")}')">
        <div class="dv-time">${item.time}</div>
        <div><div class="dv-title">📹 ${item.name}</div><div class="dv-type">${item.type} · ~${item.dur}h</div></div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('travelResult').innerHTML = html || '<p style="color:var(--muted)">Nao ha itens suficientes para esse destino com os interesses selecionados.</p>';
}

function getRadarVideos(){
  const lastUpdate = localStorage.getItem('olai_radar_time');
  const cached = localStorage.getItem('olai_radar_videos');
  const now = Date.now();
  const FIVE_HOURS = 5*60*60*1000;
  if(cached && lastUpdate && (now - parseInt(lastUpdate)) < FIVE_HOURS){
    return JSON.parse(cached);
  }
  // Shuffle and pick 12 "trending" videos to simulate refresh
  const videos = shuffle([...RADAR_POOL]).slice(0,12).map((v,i)=>({...v,rank:i+1,trending:i<3}));

  localStorage.setItem('olai_radar_time',now.toString());
  return videos;
}

// ---- CALENDARIO ----
function renderCalendar(el){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const monthNames = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = now.getDate();

  let calHtml = dayNames.map(d=>`<div class="cal-header">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) calHtml += '<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const events = calendarEvents[dateStr] || [];
    const isToday = d===today ? ' today' : '';
    calHtml += `<div class="cal-day${isToday}" onclick="showCalDay('${dateStr}')">
      <div class="cal-num">${d}</div>
      ${events.slice(0,2).map(()=>'<span class="cal-dot" style="background:var(--orange)"></span>').join('')}
      ${events.length>2?`<span style="font-size:10px;color:var(--muted)">+${events.length-2}</span>`:''}
    </div>`;
  }

  el.innerHTML = `
    <div class="header"><h1>📅 Calendario</h1><p>${monthNames[month]} ${year} — Clique em um dia para ver/adicionar conteudo.</p></div>
    <div class="cal-grid">${calHtml}</div>
    <div id="calDayDetail"></div>
  `;
}
function showCalDay(dateStr){
  const events = calendarEvents[dateStr] || [];
  const detail = document.getElementById('calDayDetail');
  detail.innerHTML = `
    <div class="card">
      <h3>📅 ${dateStr}</h3>
      ${events.length ? events.map((e,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="flex:1;font-size:13px;cursor:pointer" onclick="openScriptModal('${e.replace(/'/g,"\\'")}')">📹 ${e}</span>
          <button class="btn-sm btn-ghost" style="border:none;color:var(--red);cursor:pointer;background:transparent;font-size:16px" onclick="removeCalEvent('${dateStr}',${i})">×</button>
        </div>
      `).join('') : '<p style="color:var(--muted);font-size:13px">Nenhum conteudo agendado</p>'}
      <div style="margin-top:12px;display:flex;gap:8px">
        <input id="calNewEvent" class="search-box" placeholder="Adicionar video..." style="margin:0;flex:1">
        <button class="btn btn-sm" onclick="addCalEvent('${dateStr}')">+ Adicionar</button>
      </div>
    </div>
  `;
}
function addCalEvent(dateStr){
  const input = document.getElementById('calNewEvent');
  if(input.value.trim()){
    if(!calendarEvents[dateStr]) calendarEvents[dateStr]=[];
    calendarEvents[dateStr].push(input.value.trim());
    saveCal();
    renderCalendar(document.getElementById('main'));
    setTimeout(()=>showCalDay(dateStr),50);
  }
}
function removeCalEvent(dateStr,idx){
  calendarEvents[dateStr].splice(idx,1);
  if(calendarEvents[dateStr].length===0) delete calendarEvents[dateStr];
  saveCal();
  showCalDay(dateStr);
}

// ============ DOWNLOAD SAVED SITE ============
function downloadSavedSite(){
  const data = JSON.stringify({ bank: savedIdeas, cal: calendarEvents, apiKey: localStorage.getItem('olai_openai_key') || '' });
  // Get current HTML
  let html = document.documentElement.outerHTML;
  // Replace embedded data
  const dataTag = '<script type="application/json" id="olai-embedded-data">';
  const closeTag = '<\/script>';
  const regex = new RegExp(dataTag + '[\\s\\S]*?' + closeTag.replace(/\//g,'\\/'));
  const newDataBlock = dataTag + data + '<\/script>';
  if(html.match(regex)){
    html = html.replace(regex, newDataBlock);
  } else {
    html = html.replace('</body>', newDataBlock + '\n</body>');
  }
  html = '<!DOCTYPE html>\n<html lang="pt-BR">\n' + html.replace(/^<html[^>]*>/,'') ;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'orange-lab-ai.html';
  a.click();
  URL.revokeObjectURL(a.href);
  // Visual feedback
  const btn = event.target.closest('button') || event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '✅ Salvo!';
  btn.style.background = 'var(--green)';
  btn.style.borderColor = 'var(--green)';
  setTimeout(()=>{ btn.innerHTML = orig; btn.style.background = ''; btn.style.borderColor = ''; }, 2000);
}


// ============ LOCK SCREEN ============
const SITE_CODE = '0027';
let isUnlocked = false;

function lockNext(el, idx){
  if(el.value.length === 1 && idx < 4){
    document.getElementById('lk'+(idx+1)).focus();
  }
  if(idx === 4) tryUnlock();
}
function lockBack(e, prevIdx){
  if(e.key === 'Backspace' && e.target.value === '' && prevIdx >= 0){
    document.getElementById('lk'+(prevIdx+1)).focus();
  }
}
function tryUnlock(){
  const code = document.getElementById('lk1').value +
               document.getElementById('lk2').value +
               document.getElementById('lk3').value +
               document.getElementById('lk4').value;
  if(code === SITE_CODE){
    document.getElementById('lockScreen').classList.add('unlocked');
    isUnlocked = true;
    sessionStorage.setItem('olai_unlocked','1');
  } else {
    document.getElementById('lockError').textContent = 'Codigo incorreto. Tente novamente.';
    document.getElementById('lk1').value = '';
    document.getElementById('lk2').value = '';
    document.getElementById('lk3').value = '';
    document.getElementById('lk4').value = '';
    document.getElementById('lk1').focus();
    document.getElementById('lockScreen').style.animation = 'shake .3s';
    setTimeout(()=>{ document.getElementById('lockScreen').style.animation = ''; }, 300);
  }
}
// Check if already unlocked in this session
if(sessionStorage.getItem('olai_unlocked')==='1'){
  document.getElementById('lockScreen').classList.add('unlocked');
  isUnlocked = true;
}
// Enter key support
document.addEventListener('keydown', e => {
  if(!isUnlocked && e.key === 'Enter') tryUnlock();
});

    } else {
      btn.textContent = '❌ Falhou!';
      btn.style.background = 'var(--red)';
      alert('API Key invalida ou sem creditos. Verifique em platform.openai.com');
    }
    setTimeout(()=>{ btn.textContent = orig; btn.disabled = false; btn.style.background = ''; btn.style.borderColor = ''; }, 3000);
  })
  .catch(()=>{
    btn.textContent = '❌ Erro de rede';
    setTimeout(()=>{ btn.textContent = orig; btn.disabled = false; }, 3000);
  });
}

function removeApiKey(){
  if(confirm('Tem certeza? Os roteiros voltarao a ser gerados offline.')){
    localStorage.removeItem('olai_openai_key');
    document.getElementById('settingsApiKey').value = '';
    renderSettings(document.getElementById('main'));
  }
}

function clearAllData(){
  if(confirm('Tem certeza que quer limpar TODOS os dados? (Banco de Ideias e Calendario)')){
    savedIdeas = [];
    calendarEvents = {};
    saveBank();
    saveCal();
    alert('✅ Dados limpos!');
    renderSettings(document.getElementById('main'));
  }
}

// ============ INIT ============
buildNav();
renderSection();
</script>
<script type="application/json" id="olai-embedded-data"></script>
